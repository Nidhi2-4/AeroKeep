<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AeroKeep | Secure Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&amp;family=JetBrains+Mono:wght@100..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#e1e1f1",
                        "inverse-primary": "#5c5e6a",
                        "on-surface": "#e5e2e2",
                        "background": "#131314",
                        "on-primary-container": "#777886",
                        "on-background": "#e5e2e2",
                        "surface-container-highest": "#353435",
                        "on-secondary": "#2b3040",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "inverse-on-surface": "#313031",
                        "primary-container": "#070913",
                        "secondary-fixed": "#dee1f7",
                        "outline-variant": "#46464c",
                        "outline": "#919096",
                        "inverse-surface": "#e5e2e2",
                        "tertiary-container": "#000c10",
                        "on-secondary-fixed-variant": "#414657",
                        "on-primary": "#2e303b",
                        "error-container": "#93000a",
                        "primary-fixed-dim": "#c5c5d4",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "on-surface-variant": "#c7c6cc",
                        "surface-container": "#201f20",
                        "on-error-container": "#ffdad6",
                        "primary": "#c5c5d4",
                        "on-tertiary": "#003640",
                        "on-primary-fixed": "#191b26",
                        "tertiary": "#4cd7f6",
                        "secondary-fixed-dim": "#c1c6db",
                        "surface-tint": "#c5c5d4",
                        "surface-container-lowest": "#0e0e0f",
                        "error": "#ffb4ab",
                        "surface": "#131314",
                        "tertiary-fixed": "#acedff",
                        "on-tertiary-fixed": "#001f26",
                        "on-tertiary-container": "#00859c",
                        "secondary": "#c1c6db",
                        "on-error": "#690005",
                        "surface-variant": "#353435",
                        "surface-bright": "#3a393a",
                        "surface-container-low": "#1c1b1c",
                        "surface-dim": "#131314",
                        "on-secondary-container": "#b3b7cc",
                        "secondary-container": "#44485a",
                        "on-secondary-fixed": "#161b2a",
                        "on-primary-fixed-variant": "#444652",
                        "surface-container-high": "#2a2a2b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "4px",
                        "xl": "40px",
                        "margin-desktop": "32px",
                        "lg": "24px",
                        "gutter": "16px",
                        "md": "16px",
                        "sm": "8px",
                        "base": "4px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "body-base": ["Outfit"],
                        "title-md": ["Outfit"],
                        "headline-lg-mobile": ["Outfit"],
                        "headline-lg": ["Outfit"],
                        "data-mono": ["JetBrains Mono"],
                        "label-sm": ["JetBrains Mono"],
                        "display-lg": ["Outfit"]
                    },
                    "fontSize": {
                        "body-base": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "data-mono": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #131314;
            overflow: hidden;
        }
        .hud-grid {
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glass-panel {
            backdrop-filter: blur(16px);
            background: rgba(20, 20, 21, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-border {
            border-top: 2px solid #4cd7f6;
            box-shadow: 0 -10px 20px -10px rgba(76, 215, 246, 0.4);
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(76, 215, 246, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="font-body-base text-on-background flex items-center justify-center min-h-screen relative">
<!-- Atmospheric Background -->
<div class="fixed inset-0 hud-grid z-0"></div>
<div class="fixed inset-0 bg-gradient-to-tr from-background via-transparent to-tertiary/5 z-0"></div>
<!-- Floating Orbit Elements -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 border border-white/5 rounded-full z-0 opacity-20 animate-[pulse_8s_infinite]"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] border border-tertiary/10 rounded-full z-0 opacity-10 animate-[pulse_12s_infinite]"></div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[420px] px-margin-mobile md:px-0">
<!-- Brand Identity -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-tertiary text-[48px] mr-sm">rocket_launch</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-tertiary tracking-tight">AeroKeep</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-[0.2em] mt-xs">Deep Orbit Network</p>
</div>
<!-- Auth Node -->
<div class="glass-panel glow-border p-xl relative overflow-hidden">
<div class="scanline"></div>
<header class="mb-lg">
<h2 class="font-title-md text-title-md text-primary-fixed">Secure Access</h2>
<div class="w-12 h-0.5 bg-tertiary/30 mt-sm"></div>
</header>
<form class="space-y-lg" id="loginForm">
<!-- Operator ID -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant flex justify-between" for="operator-id">
<span>OPERATOR ID</span>
<span class="text-tertiary/40">SYS_AUTH_01</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none border-b-2 border-transparent focus:ring-0 focus:border-tertiary text-data-mono font-data-mono text-on-surface py-md px-md transition-all duration-300" id="operator-id" name="operator-id" placeholder="AERO-XXXX-XXXX" required="" type="text"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant/40 text-[18px]">badge</span>
</div>
</div>
<!-- Access Key -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant flex justify-between" for="access-key">
<span>ACCESS KEY</span>
<span class="text-tertiary/40">ENCRYPTION: AES-256</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none border-b-2 border-transparent focus:ring-0 focus:border-tertiary text-data-mono font-data-mono text-on-surface py-md px-md transition-all duration-300" id="access-key" name="access-key" placeholder="••••••••••••" required="" type="password"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant/40 text-[18px]">key</span>
</div>
</div>
<!-- Actions -->
<div class="pt-md">
<button class="w-full bg-tertiary text-on-tertiary font-label-sm text-label-sm font-bold py-lg rounded-none transition-all duration-300 hover:bg-tertiary-fixed-dim hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-sm group" type="submit">
                        INITIATE UPLINK
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Metadata Footer inside panel -->
<div class="mt-xl pt-lg border-t border-white/5 flex justify-between items-center text-on-surface-variant/40">
<div class="flex items-center gap-xs">
<span class="w-1.5 h-1.5 rounded-full bg-tertiary animate-pulse"></span>
<span class="font-data-mono text-[10px]">SYSTEM READY</span>
</div>
<a class="font-label-sm text-[10px] hover:text-tertiary transition-colors" href="#">FORGOT CREDENTIALS?</a>
</div>
</div>
<!-- Footer / Technical Disclaimer -->
<footer class="mt-lg text-center">
<p class="font-data-mono text-[11px] text-on-surface-variant/30 leading-relaxed uppercase tracking-widest">
                Classified Environment // Authorized Personnel Only<br/>
                Terminal ID: <span id="terminal-id">...</span>
</p>
</footer>
</main>
<!-- Overlay Visuals -->
<div class="pointer-events-none fixed inset-0 z-50 overflow-hidden">
<!-- Corner Brackets -->
<div class="absolute top-md left-md w-12 h-12 border-l border-t border-tertiary/20"></div>
<div class="absolute top-md right-md w-12 h-12 border-r border-t border-tertiary/20"></div>
<div class="absolute bottom-md left-md w-12 h-12 border-l border-b border-tertiary/20"></div>
<div class="absolute bottom-md right-md w-12 h-12 border-r border-b border-tertiary/20"></div>
</div>
<script>
        // Terminal ID generation for authenticity
        document.getElementById('terminal-id').textContent = 'AK-' + Math.random().toString(36).substring(2, 10).toUpperCase();

        // Interaction Feedback
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> AUTHENTICATING...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> UPLINK ESTABLISHED';
                btn.classList.replace('bg-tertiary', 'bg-tertiary-fixed-dim');
                
                // Subtle screen shake on "uplink"
                document.body.classList.add('animate-[bounce_0.2s_ease-in-out]');
                setTimeout(() => {
                    alert('Access Granted. Transitioning to Fleet Dashboard.');
                    window.location.reload(); // Simulation
                }, 1000);
            }, 1800);
        });

        // Background parallax micro-effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.hud-grid').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body></html>
