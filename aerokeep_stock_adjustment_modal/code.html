<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;family=Fira+Code:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #131314;
            color: #e5e2e2;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(32, 31, 32, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .drifting-grid {
            background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }
        .glow-in { box-shadow: 0 0 15px rgba(76, 215, 246, 0.3); }
        .glow-out { box-shadow: 0 0 15px rgba(255, 180, 171, 0.3); }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#4cd7f6",
                        "surface-container": "#201f20",
                        "on-surface": "#e5e2e2",
                        "tertiary-container": "#000c10",
                        "surface-variant": "#353435",
                        "inverse-primary": "#5c5e6a",
                        "outline": "#919096",
                        "on-tertiary": "#003640",
                        "inverse-on-surface": "#313031",
                        "surface-container-low": "#1c1b1c",
                        "on-secondary": "#2b3040",
                        "on-secondary-container": "#b3b7cc",
                        "error": "#ffb4ab",
                        "surface-container-lowest": "#0e0e0f",
                        "on-surface-variant": "#c7c6cc",
                        "on-primary-container": "#777886",
                        "on-tertiary-container": "#00859c",
                        "secondary-fixed-dim": "#c1c6db",
                        "outline-variant": "#46464c",
                        "error-container": "#93000a",
                        "tertiary": "#4cd7f6",
                        "on-primary-fixed": "#191b26",
                        "inverse-surface": "#e5e2e2",
                        "surface-container-high": "#2a2a2b",
                        "primary": "#c5c5d4",
                        "surface-container-highest": "#353435",
                        "surface-bright": "#3a393a",
                        "surface-dim": "#131314",
                        "on-secondary-fixed": "#161b2a",
                        "on-primary-fixed-variant": "#444652",
                        "surface": "#131314",
                        "on-secondary-fixed-variant": "#414657",
                        "primary-fixed": "#e1e1f1",
                        "on-error": "#690005",
                        "on-tertiary-fixed": "#001f26",
                        "secondary-fixed": "#dee1f7",
                        "surface-tint": "#c5c5d4",
                        "on-error-container": "#ffdad6",
                        "primary-fixed-dim": "#c5c5d4",
                        "primary-container": "#070913",
                        "secondary": "#c1c6db",
                        "background": "#131314",
                        "on-background": "#e5e2e2",
                        "tertiary-fixed": "#acedff",
                        "on-primary": "#2e303b",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "secondary-container": "#44485a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "base": "4px", "xs": "4px", "md": "16px", "xl": "40px", "gutter": "16px", "margin-desktop": "32px", "sm": "8px", "margin-mobile": "16px", "lg": "24px"
                    },
                    "fontFamily": {
                        "label-sm": ["JetBrains Mono"],
                        "headline-lg": ["Outfit"],
                        "body-base": ["Outfit"],
                        "title-md": ["Outfit"],
                        "data-mono": ["Fira Code"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-md">
<div class="drifting-grid"></div>
<!-- Background Context (Dashboard Mockup) -->
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none flex">
<aside class="w-64 h-full border-r border-white/5 bg-surface-container-lowest/10 backdrop-blur-md flex flex-col pt-xl px-md">
<div class="text-tertiary font-headline-lg text-headline-lg mb-xl">AeroKeep</div>
<nav class="space-y-4">
<div class="h-8 w-full bg-white/5 rounded"></div>
<div class="h-8 w-full bg-white/5 rounded"></div>
<div class="h-8 w-full bg-white/5 rounded"></div>
</nav>
</aside>
<main class="flex-1 p-xl">
<div class="grid grid-cols-12 gap-gutter">
<div class="col-span-8 h-64 glass-panel rounded-xl"></div>
<div class="col-span-4 h-64 glass-panel rounded-xl"></div>
<div class="col-span-12 h-96 glass-panel rounded-xl mt-lg"></div>
</div>
</main>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 flex items-center justify-center p-md">
<!-- Stock Adjustment Modal -->
<div class="glass-panel w-full max-w-xl rounded-xl shadow-2xl relative overflow-hidden flex flex-col animate-in fade-in zoom-in duration-300" id="adjustment-modal">
<!-- Header Glow Strip (Dynamic) -->
<div class="h-1 w-full bg-tertiary transition-all duration-500 shadow-[0_0_15px_rgba(76,215,246,0.5)]" id="glow-strip"></div>
<div class="p-lg md:p-xl space-y-lg">
<!-- Title & Header -->
<div class="flex justify-between items-start">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">Stock Adjustment</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mt-1">Component ID: AK-7742-X1</p>
</div>
<button class="text-on-surface-variant hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Current Quantity Display -->
<div class="glass-panel bg-white/5 p-lg rounded-lg border-white/5 flex flex-col items-center justify-center text-center">
<span class="font-label-sm text-label-sm text-tertiary uppercase tracking-widest mb-2">Current Inventory</span>
<div class="font-data-mono text-[56px] leading-none font-semibold text-on-surface flex items-baseline gap-2">
<span id="current-qty">1,248</span>
<span class="text-title-md font-title-md text-on-surface-variant">units</span>
</div>
</div>
<!-- Direction Toggles -->
<div class="grid grid-cols-2 gap-md">
<button class="relative group h-14 border border-tertiary/20 bg-tertiary/5 rounded-lg flex items-center justify-center gap-2 transition-all duration-300 ring-2 ring-tertiary" id="btn-in" onclick="setDirection('in')">
<span class="material-symbols-outlined text-tertiary" data-icon="add_circle">add_circle</span>
<span class="font-title-md text-title-md text-tertiary">STOCK IN</span>
</button>
<button class="relative group h-14 border border-error/20 bg-error/5 rounded-lg flex items-center justify-center gap-2 transition-all duration-300" id="btn-out" onclick="setDirection('out')">
<span class="material-symbols-outlined text-error" data-icon="remove_circle">remove_circle</span>
<span class="font-title-md text-title-md text-error">STOCK OUT</span>
</button>
</div>
<!-- Quantity & Reason -->
<div class="space-y-md">
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Adjustment Quantity</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant focus:border-tertiary focus:ring-0 transition-all font-data-mono text-title-md py-3 px-0 placeholder:text-outline-variant text-on-surface" placeholder="0.00" type="number"/>
<span class="absolute right-0 bottom-3 font-label-sm text-on-surface-variant">UNITS</span>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Reason for Change</label>
<div class="flex flex-wrap gap-2 mb-sm">
<button class="px-3 py-1 bg-white/5 border border-white/10 rounded-full font-label-sm text-label-sm hover:bg-white/10 transition-colors" onclick="fillReason('Shipment Received')">Shipment Received</button>
<button class="px-3 py-1 bg-white/5 border border-white/10 rounded-full font-label-sm text-label-sm hover:bg-white/10 transition-colors" onclick="fillReason('Assembly')">Assembly</button>
<button class="px-3 py-1 bg-white/5 border border-white/10 rounded-full font-label-sm text-label-sm hover:bg-white/10 transition-colors" onclick="fillReason('Damaged')">Damaged</button>
<button class="px-3 py-1 bg-white/5 border border-white/10 rounded-full font-label-sm text-label-sm hover:bg-white/10 transition-colors" onclick="fillReason('Internal Audit')">Audit</button>
</div>
<textarea class="w-full bg-surface-container-lowest border border-white/10 rounded-lg focus:border-tertiary focus:ring-0 transition-all font-body-base text-body-base p-3 text-on-surface resize-none" id="reason-text" placeholder="Provide additional telemetry context..." rows="2"></textarea>
</div>
</div>
<!-- Footer Actions -->
<div class="pt-md flex gap-md">
<button class="flex-1 h-12 border border-white/10 rounded-lg font-title-md text-title-md text-on-surface hover:bg-white/5 transition-all">
                        Cancel
                    </button>
<button class="flex-[2] h-12 bg-tertiary text-on-tertiary font-title-md text-title-md font-bold rounded-lg shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" id="submit-btn">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                        Confirm Adjustment
                    </button>
</div>
</div>
<!-- Technical Metadata Footer -->
<div class="bg-surface-container-low px-lg py-sm flex justify-between items-center border-t border-white/5">
<div class="font-label-sm text-[10px] text-on-surface-variant/50 uppercase flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></span>
                    System Ready
                </div>
<div class="font-data-mono text-[10px] text-on-surface-variant/50">
                    UTC: 2024-05-24 14:22:01.882
                </div>
</div>
</div>
</div>
<script>
        let currentDirection = 'in';

        function setDirection(dir) {
            currentDirection = dir;
            const btnIn = document.getElementById('btn-in');
            const btnOut = document.getElementById('btn-out');
            const submitBtn = document.getElementById('submit-btn');
            const glowStrip = document.getElementById('glow-strip');

            if (dir === 'in') {
                btnIn.classList.add('ring-2', 'ring-tertiary', 'bg-tertiary/5');
                btnOut.classList.remove('ring-2', 'ring-error', 'bg-error/5');
                submitBtn.classList.remove('bg-error', 'text-on-error');
                submitBtn.classList.add('bg-tertiary', 'text-on-tertiary');
                glowStrip.classList.remove('bg-error', 'shadow-[0_0_15px_rgba(255,180,171,0.5)]');
                glowStrip.classList.add('bg-tertiary', 'shadow-[0_0_15px_rgba(76,215,246,0.5)]');
            } else {
                btnOut.classList.add('ring-2', 'ring-error', 'bg-error/5');
                btnIn.classList.remove('ring-2', 'ring-tertiary', 'bg-tertiary/5');
                submitBtn.classList.remove('bg-tertiary', 'text-on-tertiary');
                submitBtn.classList.add('bg-error', 'text-on-error');
                glowStrip.classList.remove('bg-tertiary', 'shadow-[0_0_15px_rgba(76,215,246,0.5)]');
                glowStrip.classList.add('bg-error', 'shadow-[0_0_15px_rgba(255,180,171,0.5)]');
            }
        }

        function fillReason(text) {
            document.getElementById('reason-text').value = text;
        }

        // Simple floating animation logic for background "grid lines"
        document.addEventListener('mousemove', (e) => {
            const grid = document.querySelector('.drifting-grid');
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            grid.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body></html>
