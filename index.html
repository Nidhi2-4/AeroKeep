<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroKeep | Deep Orbit</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
      .glass-panel {
        backdrop-filter: blur(16px);
        background: rgba(32, 31, 32, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .glow-border {
        border-top: 2px solid #4cd7f6;
        box-shadow: 0 -4px 20px -10px rgba(76, 215, 246, 0.4);
      }
      .glow-border-amber {
        border-top: 2px solid #f6b34c;
        box-shadow: 0 -4px 20px -10px rgba(246, 179, 76, 0.4);
      }
      .drifting-grid {
        background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .hud-grid {
        background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .scanline {
        width: 100%; height: 2px;
        background: rgba(76, 215, 246, 0.1);
        position: absolute;
        animation: scan 4s linear infinite;
      }
      @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      body { background-color: #131314; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
