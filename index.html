<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroKeep</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#131314",
              "surface": "#131314",
              "surface-container-lowest": "#0e0e0f",
              "surface-container-low": "#1c1b1c",
              "surface-container": "#201f20",
              "surface-container-high": "#2a2a2b",
              "surface-container-highest": "#353435",
              "on-surface": "#e5e2e2",
              "on-surface-variant": "#c7c6cc",
              "outline": "#919096",
              "outline-variant": "#46464c",
              "primary": "#c5c5d4",
              "primary-fixed": "#e1e1f1",
              "primary-fixed-dim": "#c5c5d4",
              "primary-container": "#070913",
              "on-primary": "#2e303b",
              "on-primary-fixed": "#191b26",
              "on-primary-container": "#777886",
              "tertiary": "#4cd7f6",
              "tertiary-fixed": "#acedff",
              "tertiary-fixed-dim": "#4cd7f6",
              "tertiary-container": "#000c10",
              "on-tertiary": "#003640",
              "on-tertiary-container": "#00859c",
              "secondary": "#c1c6db",
              "secondary-container": "#44485a",
              "on-secondary": "#2b3040",
              "error": "#ffb4ab",
              "error-container": "#93000a",
              "on-error": "#690005",
              "surface-variant": "#353435",
              "surface-bright": "#3a393a",
              "inverse-surface": "#e5e2e2",
              "inverse-on-surface": "#313031",
              "surface-tint": "#c5c5d4"
            },
            borderRadius: {
              "DEFAULT": "0.125rem",
              "lg": "0.25rem",
              "xl": "0.5rem",
              "full": "0.75rem"
            },
            fontFamily: {
              "body-base": ["Outfit"],
              "display-lg": ["Outfit"],
              "headline-lg": ["Outfit"],
              "title-md": ["Outfit"],
              "data-mono": ["JetBrains Mono"],
              "label-sm": ["JetBrains Mono"]
            },
            fontSize: {
              "body-base": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
              "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
              "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
              "data-mono": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em"}],
              "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
    <style>
      .glass-panel {
        backdrop-filter: blur(16px);
        background: rgba(32, 31, 32, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .glow-border {
        border-top: 2px solid #4cd7f6;
        box-shadow: 0 -4px 20px -10px rgba(76, 215, 246, 0.4);
      }
      .glow-border-amber {
        border-top: 2px solid #f6b34c;
        box-shadow: 0 -4px 20px -10px rgba(246, 179, 76, 0.4);
      }
      .drifting-grid {
        background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .hud-grid {
        background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .scanline {
        width: 100%; height: 2px;
        background: rgba(76, 215, 246, 0.1);
        position: absolute;
        animation: scan 4s linear infinite;
      }
      @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      body { background-color: #131314; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
